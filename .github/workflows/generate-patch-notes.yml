name: Generate Patch Notes

on:
  push:
    branches:
      - master
    paths:
      - 'patch/**'
      - 'scripts/generate-patch-notes.ts'
      - 'layout/default.html'
  pull_request:
    branches:
      - master
    paths:
      - 'patch/**'
      - 'scripts/generate-patch-notes.ts'
      - 'layout/default.html'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Generate patch notes
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          COMMIT_SHA: ${{ github.sha }}
        run: deno run --allow-read --allow-write --allow-env --allow-run=git scripts/generate-patch-notes.ts

      - name: Upload patch notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: patch-notes
          path: build/patch/

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: generate
    concurrency:
      group: deploy-star-battle-github-io
      cancel-in-progress: false
    steps:
      - name: Download patch notes artifact
        uses: actions/download-artifact@v4
        with:
          name: patch-notes
          path: build/patch/

      - name: Deploy to star-battle.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: star-battle/star-battle.github.io
          publish_branch: main
          publish_dir: ./build/patch
          destination_dir: patch
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'chore: update patch notes'
