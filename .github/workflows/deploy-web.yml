name: Deploy Web

on:
  push:
    branches:
      - master
    paths:
      - 'web/**'
      - 'scripts/generate-web-index.ts'
      - 'layout/default.html'
  pull_request:
    branches:
      - master
    paths:
      - 'web/**'
      - 'scripts/generate-web-index.ts'
      - 'layout/default.html'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Generate web index
        run: deno run --allow-read --allow-write --allow-env scripts/generate-web-index.ts

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: build/web/

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: generate
    concurrency:
      group: deploy-star-battle-github-io
      cancel-in-progress: false
      queue: max
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web
          path: build/web/

      - name: Deploy to star-battle.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: star-battle/star-battle.github.io
          publish_branch: main
          publish_dir: ./build/web
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'chore: update web index'
